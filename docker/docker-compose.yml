services:
  backend:
    image: node:22.12
    working_dir: /app/backend
    command: sh -c "npm install && npm run start:migrate"
    environment:
      SQLITE_DATABASE_PATH: /data/dispatch.sqlite
      PORT: 8080
      CORS_ORIGIN: http://localhost:4200
      NODE_ENV: production
    ports:
      - "8080:8080"
    volumes:
      - ..:/app
      - sqlite_data:/data

volumes:
  sqlite_data:
