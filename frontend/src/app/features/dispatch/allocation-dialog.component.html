<h2 mat-dialog-title>Allocation</h2>

<mat-dialog-content>
  <div class="summary">
    <strong>{{ data.productName }}</strong>
    <span>Qty {{ data.quantity }}</span>
  </div>

  <form [formGroup]="form" class="allocation-grid">
    <mat-form-field appearance="outline">
      <mat-label>R Stock</mat-label>
      <input matInput type="number" min="0" formControlName="rStock">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>S Stock</mat-label>
      <input matInput type="number" min="0" formControlName="sStock">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>R Production</mat-label>
      <input matInput type="number" min="0" formControlName="rProduction">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>S Production</mat-label>
      <input matInput type="number" min="0" formControlName="sProduction">
    </mat-form-field>
  </form>

  <div class="total" [class.invalid]="remaining() !== 0">
    <span>Total Allocated {{ total() }}</span>
    <span *ngIf="remaining() > 0">Remaining {{ remaining() }}</span>
    <span *ngIf="remaining() < 0">Over by {{ -remaining() }}</span>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="clear()">Clear</button>
  <button mat-button type="button" mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" type="button" [disabled]="!canSave()" (click)="save()">Save</button>
</mat-dialog-actions>
