<section #page class="receipt">
  <header>
    <div>{{ displayDate() }}</div>
    <span style="margin-right: 9em;"><strong>{{ title }}</strong></span>
  </header>

  <div *ngFor="let group of groups" class="print-group">
    <div *ngFor="let item of group.items; let itemIndex = index" class="print-row">
      <div class="product">
        <span>{{ item.product.tamilName }}</span>
        <small *ngIf="item.description">{{ item.description }}</small>
      </div>
      <span class="qty">{{ item.quantity }}</span>
      <strong class="group-total" *ngIf="isLastItem(group, itemIndex)">{{ groupTotal(group) }}</strong>
    </div>
  </div>

  <footer>
    <div class="weights">
      <span *ngFor="let line of weightLines">{{ line.weight | number:'1.0-2' }}&times;{{ line.bags }}</span>
      <span style="margin-left: auto;margin-right: 2.75em;font-size: 15px;margin-top: 1em;"><strong>{{ totalBags() }}</strong></span>
    </div>
    <div class="totals">
      <span>Total Weight <strong>{{ totalWeight | number:'1.0-0' }} Kg</strong></span>
    </div>
  </footer>
</section>
